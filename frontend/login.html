<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ShopHub</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <h1><a href="index.html" style="color: white; text-decoration: none;">ShopHub</a></h1>
            </div>
            <div class="nav-menu">
                <a href="index.html">Home</a>
            </div>
            <div class="nav-actions">
                <a href="register.html">Register</a>
                <a href="cart.html" class="cart-icon">
                    🛒 Cart <span id="cartCount" class="badge">0</span>
                </a>
            </div>
        </div>
    </nav>

    <!-- Login Section -->
    <section class="auth-section">
        <div class="container">
            <div class="auth-container">
                <div class="auth-image">
                    <h2>Welcome Back!</h2>
                    <p>Login to access your account and continue shopping</p>
                    <div class="auth-illustration">
                        <svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
                            <rect x="50" y="50" width="300" height="200" rx="10" fill="#3498db" opacity="0.1"/>
                            <circle cx="200" cy="120" r="40" fill="#3498db" opacity="0.3"/>
                            <rect x="140" y="170" width="120" height="60" rx="5" fill="#3498db" opacity="0.2"/>
                        </svg>
                    </div>
                </div>
                <div class="auth-form-container">
                    <h2>Login to Your Account</h2>
                    <p class="auth-subtitle">Enter your credentials to continue</p>
                    
                    <form id="loginForm" class="auth-form">
                        <div class="form-group">
                            <label for="loginEmail">Email Address</label>
                            <input type="email" id="loginEmail" placeholder="Enter your email" required>
                        </div>
                        <div class="form-group">
                            <label for="loginPassword">Password</label>
                            <input type="password" id="loginPassword" placeholder="Enter your password" required>
                        </div>
                        <button type="submit" class="btn btn-primary btn-block btn-large">Login</button>
                    </form>
                    
                    <div class="auth-divider">
                        <span>or</span>
                    </div>
                    
                    <p class="auth-switch">
                        Don't have an account? <a href="register.html">Register here</a>
                    </p>
                    
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2025 ShopHub. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/auth-page.js"></script>
</body>
</html>
