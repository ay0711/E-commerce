<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - ShopHub</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand"><h1>ShopHub</h1></div>
            <div class="nav-menu">
                <a href="index.html">Home</a>
                <a href="account.html">My Orders</a>
                <a href="profile.html" class="active">Profile</a>
            </div>
            <div class="nav-actions"><span id="userInfo"></span></div>
        </div>
    </nav>

    <section class="account-section">
        <div class="container">
            <h2>My Profile</h2>
            <div class="account-card">
                <form id="profileForm" class="checkout-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="profileName">Full Name</label>
                            <input type="text" id="profileName" required>
                        </div>
                        <div class="form-group">
                            <label for="profileEmail">Email</label>
                            <input type="email" id="profileEmail" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="profileStreet">Street Address</label>
                            <input type="text" id="profileStreet" autocomplete="street-address">
                        </div>
                        <div class="form-group">
                            <label for="profileCity">City</label>
                            <input type="text" id="profileCity" autocomplete="address-level2">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="profileState">State</label>
                            <input type="text" id="profileState" autocomplete="address-level1">
                        </div>
                        <div class="form-group">
                            <label for="profileZip">Zip Code</label>
                            <input type="text" id="profileZip" autocomplete="postal-code">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="profileCountry">Country</label>
                        <input type="text" id="profileCountry" autocomplete="country-name">
                    </div>
                    <div class="form-group">
                        <label for="profilePassword">New Password (optional)</label>
                        <input type="password" id="profilePassword" minlength="6" placeholder="Leave blank to keep current password">
                    </div>
                    <button type="submit" class="btn btn-primary">Save Profile</button>
                </form>
            </div>
        </div>
    </section>

    <footer class="footer"><div class="container"><p>&copy; 2025 ShopHub. All rights reserved.</p></div></footer>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/profile.js"></script>
</body>
</html>
